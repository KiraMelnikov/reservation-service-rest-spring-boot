<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Hotel — Book your stay</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1d29;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #b8895a;
    --accent-dark: #8c6740;
    --gold: #d4a574;
    --ok: #047857;
    --err: #b91c1c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }

  /* Top nav */
  nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 48px;
    color: white;
  }
  nav .logo { font-family: Georgia, serif; font-size: 22px; letter-spacing: 2px; }
  nav .links { display: flex; gap: 32px; font-size: 14px; }
  nav a { color: white; text-decoration: none; opacity: 0.85; }
  nav a:hover { opacity: 1; }

  /* Hero */
  .hero {
    position: relative;
    height: 70vh; min-height: 520px;
    background:
      linear-gradient(135deg, rgba(26,29,41,0.55), rgba(26,29,41,0.35)),
      linear-gradient(180deg, #2d3748 0%, #4a5568 50%, #b8895a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; text-align: center; padding: 0 24px;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(212,165,116,0.15) 0%, transparent 50%);
  }
  .hero-content { position: relative; z-index: 1; max-width: 720px; }
  .hero h1 {
    font-family: Georgia, serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 400;
    margin: 0 0 16px;
    letter-spacing: 1px;
  }
  .hero p { font-size: 18px; opacity: 0.9; margin: 0 0 32px; }
  .hero .tagline { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-bottom: 12px; }

  /* Search bar */
  .search {
    position: relative;
    margin: -60px auto 0;
    max-width: 1080px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 16px;
    align-items: end;
    z-index: 5;
  }
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 8px 0;
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    background: transparent;
    outline: none;
  }
  .field input:focus { border-bottom-color: var(--accent); }
  .search button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    height: 48px;
  }
  .search button:hover { background: var(--accent-dark); }

  /* Section heading */
  .container { max-width: 1080px; margin: 0 auto; padding: 80px 24px; }
  .section-title { text-align: center; margin-bottom: 48px; }
  .section-title .eyebrow { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .section-title h2 { font-family: Georgia, serif; font-size: 36px; font-weight: 400; margin: 0; }

  /* Room grid */
  .rooms { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
  .room {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex; flex-direction: column;
  }
  .room:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
  .room-img {
    height: 220px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .room-img svg { width: 64px; height: 64px; opacity: 0.4; color: white; }
  .room-img .badge {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.95);
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent-dark); font-weight: 600;
  }
  .room-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .room-body h3 { font-family: Georgia, serif; font-size: 22px; font-weight: 400; margin: 0 0 8px; }
  .room-body .desc { color: var(--muted); font-size: 14px; flex: 1; margin: 0 0 16px; }
  .room-features { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .room-features span { display: flex; align-items: center; gap: 4px; }
  .room-foot { display: flex; justify-content: space-between; align-items: center; }
  .price { font-family: Georgia, serif; font-size: 24px; }
  .price small { font-size: 12px; color: var(--muted); font-family: inherit; }
  .reserve-btn {
    background: var(--ink);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .reserve-btn:hover { background: var(--accent); }
  .reserve-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; right: 32px;
    background: white;
    padding: 16px 20px;
    border-radius: 8px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    border-left: 4px solid var(--ok);
    max-width: 360px;
    transform: translateY(120px); opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.err { border-left-color: var(--err); }
  .toast .title { font-weight: 600; margin-bottom: 4px; }
  .toast .body { font-size: 13px; color: var(--muted); }
  .toast code { font-size: 11px; background: var(--bg); padding: 2px 6px; border-radius: 3px; }

  /* Bookings */
  .booking {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }
  .booking .info h4 { font-family: Georgia, serif; font-size: 18px; font-weight: 400; margin: 0 0 4px; }
  .booking .info .dates { color: var(--muted); font-size: 14px; }
  .booking .info .uuid { color: var(--muted); font-size: 11px; font-family: monospace; margin-top: 4px; }
  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    margin-left: 8px;
  }
  .status-pill.PENDING { background: #fef3c7; color: #92400e; }
  .status-pill.APPROVED { background: #d1fae5; color: #065f46; }
  .status-pill.CANCELLED { background: #fee2e2; color: #991b1b; }
  .booking .cancel-btn {
    background: transparent;
    color: var(--err);
    border: 1px solid var(--err);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .booking .cancel-btn:hover { background: var(--err); color: white; }
  .booking .cancel-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty { text-align: center; color: var(--muted); padding: 32px; font-style: italic; }

  /* Footer */
  footer { background: var(--ink); color: rgba(255,255,255,0.6); padding: 32px 24px; text-align: center; font-size: 13px; }
  footer a { color: var(--gold); }

  @media (max-width: 720px) {
    .search { grid-template-columns: 1fr; }
    nav { padding: 16px 24px; }
    nav .links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">AURORA</div>
  <div class="links">
    <a href="#rooms">Rooms</a>
    <a href="index.html">API</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <div class="tagline">— Boutique Hotel —</div>
    <h1>Where every stay feels like home</h1>
    <p>Discover hand-picked rooms in the heart of the city. Comfort, elegance, and a warm welcome — always.</p>
  </div>
</section>

<div class="search" id="search">
  <div class="field">
    <label for="checkin">Check-in</label>
    <input type="date" id="checkin">
  </div>
  <div class="field">
    <label for="checkout">Check-out</label>
    <input type="date" id="checkout">
  </div>
  <div class="field">
    <label for="guestId">Guest ID</label>
    <input type="number" id="guestId" placeholder="Your guest number" value="1">
  </div>
  <button onclick="scrollToRooms()">Find rooms</button>
</div>

<div class="container" id="rooms">
  <div class="section-title">
    <div class="eyebrow">Our rooms</div>
    <h2>Choose where to stay</h2>
  </div>
  <div class="rooms" id="roomList"></div>
</div>

<div class="container" id="bookings" style="padding-top: 0;">
  <div class="section-title">
    <div class="eyebrow">Your stays</div>
    <h2>My bookings</h2>
  </div>
  <div style="text-align: center; margin-bottom: 24px;">
    <button class="reserve-btn" id="refreshBookings" style="background: var(--accent);">Refresh</button>
  </div>
  <div id="bookingList" style="display: grid; gap: 16px;"></div>
</div>

<footer>
  &copy; Aurora Hotel · Powered by the reservation API · <a href="index.html">developer view</a>
</footer>

<div class="toast" id="toast">
  <div class="title" id="toastTitle"></div>
  <div class="body" id="toastBody"></div>
</div>

<script>
const ROOMS = [
  {
    id: 101, name: "Deluxe Queen",
    desc: "A bright, airy room with a queen bed and city view. Perfect for solo travelers and couples.",
    price: 120, badge: "Popular",
    features: ["Queen bed", "City view", "30 m²"],
    gradient: "linear-gradient(135deg, #d4a574 0%, #8c6740 100%)"
  },
  {
    id: 102, name: "Garden Suite",
    desc: "Spacious suite opening onto a private garden patio. A serene retreat just steps from the lobby.",
    price: 180,
    features: ["King bed", "Garden patio", "45 m²"],
    gradient: "linear-gradient(135deg, #87a878 0%, #4a6741 100%)"
  },
  {
    id: 201, name: "Ocean View",
    desc: "Wake up to the sound of waves. Floor-to-ceiling windows frame an unforgettable seascape.",
    price: 250, badge: "Sea view",
    features: ["King bed", "Balcony", "55 m²"],
    gradient: "linear-gradient(135deg, #6a92b0 0%, #2d4a5e 100%)"
  },
  {
    id: 301, name: "Penthouse",
    desc: "The pinnacle of Aurora. Two bedrooms, private terrace, and personal concierge service.",
    price: 450, badge: "Top floor",
    features: ["2 bedrooms", "Terrace", "120 m²"],
    gradient: "linear-gradient(135deg, #2d3748 0%, #1a1d29 100%)"
  }
];

const BED_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 17v-7a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v7M2 17h20M2 17v3M22 17v3M7 11h4"/></svg>`;

function todayPlus(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function initDates() {
  document.getElementById('checkin').value = todayPlus(1);
  document.getElementById('checkout').value = todayPlus(3);
  const today = todayPlus(0);
  document.getElementById('checkin').min = today;
  document.getElementById('checkout').min = today;
}

function renderRooms() {
  const list = document.getElementById('roomList');
  list.innerHTML = ROOMS.map(r => `
    <div class="room">
      <div class="room-img" style="background: ${r.gradient}">
        ${BED_ICON}
        ${r.badge ? `<div class="badge">${r.badge}</div>` : ''}
      </div>
      <div class="room-body">
        <h3>${r.name}</h3>
        <p class="desc">${r.desc}</p>
        <div class="room-features">
          ${r.features.map(f => `<span>· ${f}</span>`).join('')}
        </div>
        <div class="room-foot">
          <div class="price">$${r.price}<small> / night</small></div>
          <button class="reserve-btn" data-room="${r.id}">Reserve</button>
        </div>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.reserve-btn').forEach(btn => {
    btn.addEventListener('click', () => reserve(parseInt(btn.dataset.room, 10), btn));
  });
}

function scrollToRooms() {
  document.getElementById('rooms').scrollIntoView({ behavior: 'smooth' });
}

function showToast(title, body, isError = false) {
  const toast = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastBody').innerHTML = body;
  toast.classList.toggle('err', isError);
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 5000);
}

async function reserve(roomId, btn) {
  const startDate = document.getElementById('checkin').value;
  const endDate = document.getElementById('checkout').value;
  const userId = parseInt(document.getElementById('guestId').value, 10);

  if (!startDate || !endDate) {
    showToast('Pick your dates', 'Please select check-in and check-out dates.', true);
    return;
  }
  if (endDate <= startDate) {
    showToast('Invalid dates', 'Check-out must be after check-in.', true);
    return;
  }
  if (!userId || userId < 1) {
    showToast('Guest ID required', 'Please enter a valid guest ID.', true);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Booking…';

  try {
    const res = await fetch('/api/v1/reservations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, roomId, startDate, endDate })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);

    const room = ROOMS.find(r => r.id === roomId);
    const uuid = data.reservation && data.reservation.uuid ? data.reservation.uuid : '—';
    showToast(
      `${room.name} is yours!`,
      `${startDate} → ${endDate}<br>Confirmation: <code>${uuid}</code>`
    );
    loadBookings();
  } catch (e) {
    showToast('Booking failed', e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reserve';
  }
}

async function loadBookings() {
  const userId = parseInt(document.getElementById('guestId').value, 10);
  const list = document.getElementById('bookingList');

  if (!userId || userId < 1) {
    list.innerHTML = '<div class="empty">Enter a guest ID above to see your bookings.</div>';
    return;
  }

  list.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res = await fetch('/api/v1/reservations');
    const data = await res.json();
    const all = Array.isArray(data.reservation) ? data.reservation : [];
    const mine = all.filter(r => r.userId === userId);

    if (mine.length === 0) {
      list.innerHTML = '<div class="empty">No bookings yet. Reserve a room above to get started.</div>';
      return;
    }

    list.innerHTML = mine.map(r => {
      const room = ROOMS.find(x => x.id === r.roomId);
      const roomName = room ? room.name : `Room ${r.roomId}`;
      const canCancel = r.status !== 'CANCELLED';
      return `
        <div class="booking">
          <div class="info">
            <h4>${roomName}<span class="status-pill ${r.status}">${r.status}</span></h4>
            <div class="dates">${r.startDate} → ${r.endDate}</div>
            <div class="uuid">${r.uuid}</div>
          </div>
          <button class="cancel-btn" data-uuid="${r.uuid}" ${canCancel ? '' : 'disabled'}>
            ${canCancel ? 'Cancel' : 'Cancelled'}
          </button>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.cancel-btn').forEach(btn => {
      if (btn.disabled) return;
      btn.addEventListener('click', () => cancelBooking(btn.dataset.uuid, btn));
    });
  } catch (e) {
    list.innerHTML = `<div class="empty">Could not load bookings: ${e.message}</div>`;
  }
}

async function cancelBooking(uuid, btn) {
  if (!confirm('Cancel this booking?')) return;
  btn.disabled = true;
  btn.textContent = 'Cancelling…';
  try {
    const res = await fetch(`/api/v1/reservations/${encodeURIComponent(uuid)}`, { method: 'DELETE' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      throw new Error(data.message || `HTTP ${res.status}`);
    }
    showToast('Booking cancelled', 'Your reservation has been cancelled.');
    loadBookings();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Cancel';
    showToast('Cancel failed', e.message, true);
  }
}

document.getElementById('refreshBookings').addEventListener('click', loadBookings);
document.getElementById('guestId').addEventListener('change', loadBookings);

initDates();
renderRooms();
loadBookings();
</script>
</body>
</html>
