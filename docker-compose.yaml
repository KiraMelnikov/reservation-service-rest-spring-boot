services:
  reservation_service:
    container_name: reservation-service
    build:
      context: .
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reservation
      SPRING_DATASOURCE_USERNAME: reservation
      SPRING_DATASOURCE_PASSWORD: reservation
    networks:
      - reservation-net
    restart: unless-stopped

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: reservation
      POSTGRES_USER: reservation
      POSTGRES_PASSWORD: reservation
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservation -d reservation"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reservation-net
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  reservation-net:
    driver: bridge
